# Netlify configuration for TanStack Start SSR
[build]
  # Build command
  command = "npm run build"
  # Directory to publish (static assets from TanStack Start build)
  publish = "dist/client"
  # Functions directory
  functions = "netlify/functions"

# Configure Node.js version
[env]
  NODE_VERSION = "18"

# Rewrite all requests to the SSR function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200
  force = true

# Exclude static asset paths from the SSR function
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200

# Cache headers for different asset types
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
